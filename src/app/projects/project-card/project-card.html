<button
  class="card"
  type="button"
  [attr.aria-label]="'Voir le projet ' + project().name"
  (click)="open.emit()"
  (mouseenter)="hovered.set(true)"
  (mouseleave)="hovered.set(false)"
  (focus)="hovered.set(true)"
  (blur)="hovered.set(false)"
>
  <div class="stage">
    <span class="type-badge">{{ project().badge }}</span>
    <app-device-frame [project]="project()" [active]="hovered()" />
  </div>

  <div class="body">
    <h3>
      {{ project().name }}
      <span class="arr" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M7 17 17 7M9 7h8v8" />
        </svg>
      </span>
    </h3>
    <p>{{ project().description }}</p>
    @if (project().tags.length) {
      <div class="tags">
        @for (tag of project().tags; track tag) {
          <span class="tag">{{ tag }}</span>
        }
      </div>
    }
  </div>
</button>
