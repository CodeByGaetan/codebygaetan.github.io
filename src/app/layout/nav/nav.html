<header class="site-header">
  <nav class="nav">
    <a href="#home" class="brand" (click)="closeMenu()">Gaétan <b>La&nbsp;Selve</b></a>

    <div class="nav-links" [class.open]="menuOpen()">
      <a href="#services" (click)="closeMenu()">Ce que je fais</a>
      <a href="#about" (click)="closeMenu()">À propos</a>
      <a href="#projects" (click)="closeMenu()">Projets</a>
      <a href="#contact" class="nav-cta nav-cta--mobile" (click)="closeMenu()">Me contacter</a>
    </div>

    <a href="#contact" class="nav-cta nav-cta--desktop">Me contacter</a>

    <button
      class="icon-btn burger"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      [attr.aria-label]="menuOpen() ? 'Fermer le menu' : 'Ouvrir le menu'"
    >
      @if (menuOpen()) {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M6 6l12 12M18 6 6 18" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M4 7h16M4 12h16M4 17h16" />
        </svg>
      }
    </button>
  </nav>
</header>
